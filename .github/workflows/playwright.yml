name: Playwright Tests ( with BDD extension )

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
    paths:
      - '03-ui-automation-playwright/**' 
  pull_request:
    branches: [ main, master ]
    paths:
      - '03-ui-automation-playwright/**' 

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: 03-ui-automation-playwright/package-lock.json
    - name: Install dependencies
      run: npm ci 
      working-directory: 03-ui-automation-playwright

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps 
      working-directory: 03-ui-automation-playwright

    - name: Run Playwright tests
      run: npx playwright test
      working-directory: 03-ui-automation-playwright
    
    - name: Run BDD Cucumber tests
      run: npm run test:bdd
      working-directory: 03-ui-automation-playwright
     
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: 03-ui-automation-playwright/playwright-report/ 
        retention-days: 30

    - name: Upload Cucumber BDD Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cucumber-report
        path: 03-ui-automation-playwright/bdd-tests/reports/
        retention-days: 30